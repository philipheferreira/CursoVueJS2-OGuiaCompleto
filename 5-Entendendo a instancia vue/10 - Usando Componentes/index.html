<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

<style type="text/css">
	
	

</style>


<div id="app">

	<comp></comp>
	<comp></comp>
	<comp></comp>
</div>


<script >
	
	 Vue.component('comp', {
        template: `
            <div>
                <h1>{{ aula }}</h1>
                <h2>{{ modulo }}</h2>
                <button @click="alterarAula">Alterar Aula</button>
                <button @click="alterarModulo">Alterar Módulo</button>
            </div>
        `,
        data: function() {
            return { /* Por mais que o data exista, necessario criar o comando function e return a cima para 
                poder retornar as informacoes dos valores para o DOM. Diferente de metodos que retorna funcios, data
                retorna valores de variaveis, necessitando de uma funcao para retornar e atualizar o valor para os componentes
                atualizando o estado de cada complonente para as aplicacoes */
                aula: 'Aula: Montando Instância Vue',
                modulo: 'Módulo: Instância Vue'
            }
        },
        methods: {
            alterarAula() {
                this.aula += '#'
            },
            alterarModulo() {
                this.modulo += '#'
            }
        }
    })

    const vm = new Vue({ /* O instanciamento ocorre aqui em baixo, em vez de junto com o componente como antes */
        el: '#app'
    }) 
</script>
