<!--Quando eu faco uma alteracao do codigo o Vue fica toda hora visualizando qualquer alteracao. Ou seja se eu criar um metodo para alterar
o valor de uma variavel data entao nas 2 chamadas que forem realizadas para ele, ele sempre ira atualizar tanto na primeira quanto na segunda chamada.
Se eu usar V-once ele impede isso. Sempre que ocorre uma alteracao de algum valor na instancia, altera em todo o Vue -->

<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title> 21 - Entendendo e Usando Diretivas</title>
	<!-- Importa o Vue 2 via CDN -->
	<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
</head>
<body>
	<div id="app">
	  <p v-once>{{ titulo }}</p> <!-- V-once lê a variavel apenas uma unica vez e mesmo que ocorra uma alteração no estado da informação ele lê o momento definido da leitura das informações. Serve para consumir menos recursos, já que ele só verifica e atualiza uma unica vez -->
	  <p> {{ saudacao() }} </p>
	</div>

<script>
  new Vue({
    el: '#app',
    data: {
      titulo: 'Usando VueJS!'
    },
    methods: {
    	saudacao: function() {
    		this.titulo = 'Bom dia!!!'
    		return this.titulo
    	}
    }
  });
</script>
</body>
</html>
